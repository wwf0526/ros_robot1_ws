# 电机配置部分(使用socketcan)
motor_node:
  ros__parameters:
    interface: socketcan              # 使用SocketCAN统一接口
    primary_channel: can0             # 第一条CAN总线（电机1-3）
    secondary_channel: can1           # 第二条CAN总线（电机4-6）
    bitrate: 1000000                  # CAN总线波特率
    feedback_id: 10                   # 电机状态反馈CAN ID
    microstep: 32                     # 步进电机微步设置
    timeout: 1.0                      # CAN通讯超时时间（秒）
    motor_ids: [1, 2, 3, 4, 5, 6]    # 六台电机ID
    secondary_ids: [4, 5, 6]          # 第二路CAN的电机
    direction: {1: 1, 2: 1, 3: 1, 4: 1, 5: 1, 6: 1}
    command_topic: /motor/command     # 控制指令ROS2话题
    command_array_topic: /motor/command_array
    state_topic: /motor/state         # 电机状态ROS2话题
    publish_rate: 50.0                # 状态话题发布频率（Hz）
    default_speed_rad_s: 3.0          # 默认速度（rad/s）
    zero_tolerance_deg: 0.2           # 回零允许误差（度）
