# IMU 配置部分
dual_imu_serial_node:
  ros__parameters:
    port: /dev/ttyUSB0               # 串口设备号
    baudrate: 115200                 # 串口波特率
    publish_rate: 200.0              # 发布频率（Hz）
    imu1_topic: /imu1/data_raw       # IMU1话题名
    imu2_topic: /imu2/data_raw       # IMU2话题名
    imu1_frame_id: imu1_link         # IMU1坐标系
    imu2_frame_id: imu2_link         # IMU2坐标系
    status_period: 5.0               # 状态输出周期（秒）

